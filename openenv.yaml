name: youtube-addiction-controller
version: "1.0.0"
description: >
  An RL environment where an LLM agent acts as a screen-time controller.
  It observes a simulated user's YouTube session and decides to allow, block,
  or suggest a break — balancing productivity vs entertainment.
author: hackathon-participant
tags: [productivity, screen-time, rl, llm-agent]

tasks:
  - id: task_casual
    name: Casual User
    description: A balanced user who occasionally watches YouTube but mostly stays productive.
    difficulty: easy
    max_steps: 20

  - id: task_addict
    name: Addicted User
    description: A heavy YouTube user who resists breaks and binge-watches for hours.
    difficulty: medium
    max_steps: 20

  - id: task_binge_procrastinator
    name: Binge Procrastinator
    description: A user with deadlines who keeps switching back to YouTube despite blocks.
    difficulty: hard
    max_steps: 20

actions:
  - id: allow
    description: Allow the current video to continue playing.
  - id: block
    description: Block YouTube / pause the session.
  - id: suggest_break
    description: Suggest a short break with a motivational nudge.

observation_space:
  - session_minutes: integer        # total session time so far
  - youtube_minutes: integer        # minutes spent on YouTube this session
  - productive_minutes: integer     # minutes on productive tasks
  - current_activity: string        # "youtube" | "productive" | "idle"
  - videos_watched: integer         # number of videos watched
  - last_action: string             # last action taken by agent
  - user_mood: string               # "focused" | "bored" | "resistant" | "tired"
  - time_of_day: string             # "morning" | "afternoon" | "evening" | "night"
  - pending_deadline: boolean       # whether user has a deadline today

reward_range: [0.0, 1.0]
