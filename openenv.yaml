---
title: YouTube Addiction Controller
emoji: 📱
colorFrom: red
colorTo: yellow
sdk: docker
pinned: false
---

name: youtube-addiction-controller
version: "1.0.0"
description: >
  An RL environment where an LLM agent acts as a screen-time controller,
  balancing a simulated user's YouTube entertainment vs productivity.

entrypoint: http://localhost:7860

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  grade:
    method: GET
    path: /grade

tasks:
  - id: task_casual
    name: Casual User
    description: A balanced user who occasionally watches YouTube.
    difficulty: easy
    max_steps: 20
    grader: grade_task_casual
  - id: task_addict
    name: Addicted User
    description: A heavy YouTube user who resists breaks.
    difficulty: medium
    max_steps: 20
    grader: grade_task_addict
  - id: task_binge_procrastinator
    name: Binge Procrastinator
    description: A user with deadlines who keeps switching back to YouTube.
    difficulty: hard
    max_steps: 20
    grader: grade_task_binge_procrastinator

actions:
  - id: allow
    description: Allow the current video to continue playing.
  - id: block
    description: Block YouTube / pause the session.
  - id: suggest_break
    description: Suggest a short break.

observation_space:
  session_minutes:
    type: integer
    description: Total session time in minutes
  youtube_minutes:
    type: integer
    description: Minutes spent on YouTube
  productive_minutes:
    type: integer
    description: Minutes on productive tasks
  current_activity:
    type: string
    description: "youtube | productive | idle"
  videos_watched:
    type: integer
    description: Number of videos watched
  last_action:
    type: string
    description: Last action taken by agent
  user_mood:
    type: string
    description: "focused | bored | resistant | tired"
  time_of_day:
    type: string
    description: "morning | afternoon | evening | night"
  pending_deadline:
    type: boolean
    description: Whether user has a deadline today

reward_range:
  low: 0.0
  high: 1.0

graders:
  - task_id: task_casual
    module: app.graders
    function: grade_task_casual
  - task_id: task_addict
    module: app.graders
    function: grade_task_addict
  - task_id: task_binge_procrastinator
    module: app.graders
    function: grade_task_binge_procrastinator